schema = "retrofx.profile/v2alpha1"

[identity]
id = "wm-chrome-overrides"
name = "WM Chrome Overrides"
family = "warm-night"
strictness = "practical-daily-driver"

[color.semantic]
bg0 = "#14110f"
fg0 = "#efe2d0"
accent_primary = "#d9a066"
border_active = "#cf8a4a"
border_inactive = "#3b312b"
selection_bg = "#8a5a3a"
selection_fg = "#f8ead8"
cursor = "#f8ead8"

[typography]
terminal_primary = "Iosevka Fixed"
ui_sans = "Iosevka Aile"
ui_mono = "Iosevka Fixed"

[chrome]
gaps = 12
bar_style = "boxed"
launcher_style = "boxed"
notification_style = "toast"
icon_theme = "Papirus-Dark"
cursor_theme = "Bibata-Modern-Classic"

[session]
targets = ["wm", "wayland", "launcher", "notifications"]
apply_mode = "export-only"
persistence = "export-only"
